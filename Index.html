<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pizzería con las mejores pizzas artesanales">
    <meta name="keywords" content="pizza, pizzeria, comida italiana">
    <meta name="author" content="Andres Vallejo">

    <title>Pizza hornny</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Script.js">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Pizza hornny</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Menú</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero text-center text-white d-flex align-items-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Las mejores pizzas de la ciudad</h1>
            <p>Disfruta sabores únicos y promociones especiales.</p>

            <button class="btn btn-warning mt-3" data-bs-toggle="modal" data-bs-target="#registro">
                Registrarse
            </button>
        </div>
    </section>

    <div class="modal fade" id="registro">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Registro</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formulario">

                        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre">

                        <input type="email" id="correo" class="form-control mb-3" placeholder="Correo">

                        <input type="password" id="clave" class="form-control mb-3" placeholder="Contraseña">

                        <button class="btn btn-dark w-100">
                            Guardar
                        </button>

                    </form>

                    <p id="mensaje" class="text-danger mt-2"></p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
